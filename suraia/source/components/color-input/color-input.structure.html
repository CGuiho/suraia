<div class="suraia-color-input" data-suraia-component="ColorInput" data-suraia-format="hex">
  <label class="suraia-color-input-label" for="color-input-example">Accent color</label>
  <div class="suraia-color-input-control">
    <span class="suraia-color-input-preview" aria-hidden="true"></span>
    <input class="suraia-color-input-field" id="color-input-example" type="text" value="#7950f2" spellcheck="false" />
    <button class="suraia-color-input-picker-trigger" type="button" aria-label="Open color picker">Pick</button>
  </div>
  <p class="suraia-color-input-error" role="alert">Enter a valid CSS color.</p>
</div>
