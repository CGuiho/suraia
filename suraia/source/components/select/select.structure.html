<!-- Suraia Select Component Blueprint -->
<div class="suraia-input-wrapper" data-suraia-component="Select" data-suraia-size="sm" data-suraia-variant="default">
  <label class="suraia-input-label" for="select-input">Label</label>
  <p class="suraia-input-description">Description text.</p>

  <div class="suraia-select-wrapper">
    <div class="suraia-input-container">
      <input
        type="text"
        class="suraia-input suraia-select-input"
        id="select-input"
        role="combobox"
        aria-expanded="false"
        aria-haspopup="listbox"
        aria-controls="select-listbox"
        aria-autocomplete="list"
        placeholder="Pick one"
        readonly
      />
      <div class="suraia-input-section" data-position="right">
        <span class="suraia-select-chevron" aria-hidden="true"></span>
      </div>
    </div>

    <!-- Dropdown -->
    <div class="suraia-select-dropdown" id="select-listbox" role="listbox" hidden>
      <div class="suraia-select-option" role="option" data-suraia-selected aria-selected="true">Option 1</div>
      <div class="suraia-select-option" role="option">Option 2</div>
      <div class="suraia-select-option" role="option" data-suraia-disabled aria-disabled="true">Option 3 (disabled)</div>
      <div class="suraia-select-nothing">Nothing found</div>
    </div>
  </div>

  <p class="suraia-input-error">Error message.</p>
</div>
