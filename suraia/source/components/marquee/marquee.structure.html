<!-- Suraia Marquee Component Blueprint -->
<div
  class="suraia-marquee"
  data-suraia-component="Marquee"
  data-suraia-direction="left"
  data-suraia-pause-on-hover="true"
  style="--suraia-marquee-speed: 50s;"
>
  <div class="suraia-marquee-content">
    <div class="suraia-marquee-item">Item 1</div>
    <div class="suraia-marquee-item">Item 2</div>
  </div>
  <!-- Repeated content to fill viewport for seamless scrolling -->
  <div class="suraia-marquee-content" aria-hidden="true">
    <div class="suraia-marquee-item">Item 1</div>
    <div class="suraia-marquee-item">Item 2</div>
  </div>
</div>
