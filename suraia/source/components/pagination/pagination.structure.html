<!-- Suraia Pagination Component Blueprint -->
<nav class="suraia-pagination" data-suraia-component="Pagination" data-suraia-size="md" aria-label="Pagination">
  <button class="suraia-pagination-control" data-suraia-edge aria-label="First page" disabled>&laquo;</button>
  <button class="suraia-pagination-control" data-suraia-prev aria-label="Previous page">&lsaquo;</button>

  <button class="suraia-pagination-item" aria-current="page" data-suraia-active>1</button>
  <button class="suraia-pagination-item">2</button>
  <button class="suraia-pagination-item">3</button>
  <span class="suraia-pagination-dots" aria-hidden="true">…</span>
  <button class="suraia-pagination-item">10</button>

  <button class="suraia-pagination-control" data-suraia-next aria-label="Next page">&rsaquo;</button>
  <button class="suraia-pagination-control" data-suraia-edge aria-label="Last page">&raquo;</button>
</nav>
