<!-- Suraia Divider Component Blueprint -->

<!-- Simple horizontal divider -->
<div
  class="suraia-divider"
  data-suraia-component="Divider"
  data-suraia-orientation="horizontal"
  data-suraia-size="xs"
  role="separator"
></div>

<!-- Divider with label -->
<div
  class="suraia-divider"
  data-suraia-component="Divider"
  data-suraia-orientation="horizontal"
  data-suraia-size="xs"
  data-suraia-with-label
  role="separator"
>
  <span class="suraia-divider-label" data-position="center">
    Label text
  </span>
</div>

<!-- Vertical divider -->
<div
  class="suraia-divider"
  data-suraia-component="Divider"
  data-suraia-orientation="vertical"
  data-suraia-size="xs"
  role="separator"
  aria-orientation="vertical"
></div>
