<!-- Suraia Avatar Component Blueprint -->
<!-- With image -->
<div
  class="suraia-avatar"
  data-suraia-component="Avatar"
  data-suraia-size="md"
  data-suraia-variant="light"
>
  <img class="suraia-avatar-image" src="user.jpg" alt="User name" />
</div>

<!-- Initials fallback -->
<div
  class="suraia-avatar"
  data-suraia-component="Avatar"
  data-suraia-size="md"
  data-suraia-variant="filled"
>
  <span class="suraia-avatar-placeholder">JD</span>
</div>

<!-- Default icon placeholder -->
<div
  class="suraia-avatar"
  data-suraia-component="Avatar"
  data-suraia-size="md"
  data-suraia-variant="light"
>
  <span class="suraia-avatar-placeholder" aria-label="User">
    <!-- Default user icon SVG -->
  </span>
</div>
