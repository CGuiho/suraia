<!-- Suraia SegmentedControl Component Blueprint -->
<div
  class="suraia-segmented-control"
  data-suraia-component="SegmentedControl"
  data-suraia-size="sm"
  role="radiogroup"
  aria-label="View mode"
>
  <label class="suraia-segmented-control-item" data-suraia-active>
    <input type="radio" class="suraia-segmented-control-input" name="view" value="list" checked />
    <span class="suraia-segmented-control-label">List</span>
  </label>
  <label class="suraia-segmented-control-item">
    <input type="radio" class="suraia-segmented-control-input" name="view" value="grid" />
    <span class="suraia-segmented-control-label">Grid</span>
  </label>
  <label class="suraia-segmented-control-item">
    <input type="radio" class="suraia-segmented-control-input" name="view" value="gallery" />
    <span class="suraia-segmented-control-label">Gallery</span>
  </label>
  <span class="suraia-segmented-control-indicator"></span>
</div>
