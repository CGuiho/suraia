<!-- Suraia Loader Component Blueprint -->

<!-- Oval spinner (default) -->
<span
  class="suraia-loader suraia-loader-oval"
  data-suraia-component="Loader"
  data-suraia-type="oval"
  data-suraia-size="md"
  role="status"
  aria-label="Loading"
></span>

<!-- Bars -->
<span
  class="suraia-loader suraia-loader-bars"
  data-suraia-component="Loader"
  data-suraia-type="bars"
  data-suraia-size="md"
  role="status"
  aria-label="Loading"
>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</span>

<!-- Dots -->
<span
  class="suraia-loader suraia-loader-dots"
  data-suraia-component="Loader"
  data-suraia-type="dots"
  data-suraia-size="md"
  role="status"
  aria-label="Loading"
>
  <span></span>
  <span></span>
  <span></span>
</span>
