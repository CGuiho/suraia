<!-- Suraia Textarea Component Blueprint -->
<div
  class="suraia-input-wrapper"
  data-suraia-component="Textarea"
  data-suraia-size="sm"
  data-suraia-variant="default"
>
  <label class="suraia-input-label" for="textarea-id">Label</label>
  <p class="suraia-input-description">Optional description.</p>
  <div class="suraia-input-container">
    <textarea
      class="suraia-textarea"
      id="textarea-id"
      rows="4"
      placeholder="Enter text..."
    ></textarea>
  </div>
  <p class="suraia-input-error">Error message.</p>
</div>
