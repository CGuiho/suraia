<!-- Suraia FocusTrap Component Blueprint -->
<div class="suraia-focus-trap" data-suraia-component="FocusTrap" data-suraia-active="true">
  <!-- Invisible focus sentinel for tab wrapping -->
  <span tabindex="0" class="suraia-focus-trap-sentinel" aria-hidden="true"></span>
  
  <div class="suraia-focus-trap-content">
    <!-- Interactive contents -->
    <button>Start</button>
    <button>End</button>
  </div>
  
  <span tabindex="0" class="suraia-focus-trap-sentinel" aria-hidden="true"></span>
</div>
