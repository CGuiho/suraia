<!-- Suraia Tree Component Blueprint -->
<ul class="suraia-tree" data-suraia-component="Tree" role="tree">
  <li class="suraia-tree-node-wrapper" role="none">
    <div
      class="suraia-tree-node"
      role="treeitem"
      data-suraia-expanded="true"
      data-suraia-selected="false"
      data-suraia-level="1"
    >
      <span class="suraia-tree-node-toggle" aria-hidden="true">▼</span>
      <span class="suraia-tree-node-label">Root Node</span>
    </div>
    <ul class="suraia-tree-subgroup" role="group">
      <li class="suraia-tree-node-wrapper" role="none">
        <div
          class="suraia-tree-node"
          role="treeitem"
          data-suraia-selected="true"
          data-suraia-level="2"
        >
          <span class="suraia-tree-node-label">Child Node</span>
        </div>
      </li>
    </ul>
  </li>
</ul>
