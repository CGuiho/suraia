<!-- Suraia NumberInput Component Blueprint -->
<div class="suraia-input-wrapper" data-suraia-component="NumberInput" data-suraia-size="sm">
  <label class="suraia-input-label" for="num-input">Quantity</label>
  <div class="suraia-input-container">
    <input type="text" inputmode="decimal" class="suraia-input" id="num-input" role="spinbutton" aria-valuenow="5" aria-valuemin="0" aria-valuemax="100" value="5" />
    <div class="suraia-number-input-controls">
      <button class="suraia-number-input-control" data-suraia-direction="up" type="button" tabindex="-1" aria-label="Increment">▲</button>
      <button class="suraia-number-input-control" data-suraia-direction="down" type="button" tabindex="-1" aria-label="Decrement">▼</button>
    </div>
  </div>
</div>
