<!-- Suraia PasswordInput Component Blueprint -->
<div class="suraia-input-wrapper" data-suraia-component="PasswordInput" data-suraia-size="sm">
  <label class="suraia-input-label" for="pw-input">Password</label>
  <div class="suraia-input-container">
    <input type="password" class="suraia-input" id="pw-input" placeholder="Enter password" />
    <div class="suraia-input-section" data-position="right">
      <button class="suraia-password-toggle" type="button" aria-label="Toggle password visibility" tabindex="-1">
        👁
      </button>
    </div>
  </div>
  <p class="suraia-input-error">Error.</p>
</div>
