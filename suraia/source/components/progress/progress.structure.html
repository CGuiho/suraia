<!-- Suraia Progress Component Blueprint -->
<div
  class="suraia-progress"
  data-suraia-component="Progress"
  data-suraia-size="md"
  role="progressbar"
  aria-valuenow="45"
  aria-valuemin="0"
  aria-valuemax="100"
>
  <div class="suraia-progress-bar" style="width: 45%;"></div>
</div>

<!-- Striped animated -->
<div
  class="suraia-progress"
  data-suraia-component="Progress"
  data-suraia-size="md"
  data-suraia-striped
  data-suraia-animated
  role="progressbar"
  aria-valuenow="65"
  aria-valuemin="0"
  aria-valuemax="100"
>
  <div class="suraia-progress-bar" style="width: 65%;"></div>
</div>
