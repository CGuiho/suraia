<!-- Suraia Badge Component Blueprint -->
<div
  class="suraia-badge"
  data-suraia-component="Badge"
  data-suraia-variant="filled"
  data-suraia-size="md"
>
  <!-- Left section slot -->
  <span class="suraia-badge-section" data-position="left">
    <slot name="leftSection"></slot>
  </span>

  <!-- Label -->
  <span class="suraia-badge-label">Badge text</span>

  <!-- Right section slot -->
  <span class="suraia-badge-section" data-position="right">
    <slot name="rightSection"></slot>
  </span>
</div>

<!-- Dot variant -->
<div
  class="suraia-badge"
  data-suraia-component="Badge"
  data-suraia-variant="dot"
  data-suraia-size="md"
>
  <span class="suraia-badge-label">Dot badge</span>
</div>
