<!-- Suraia Title Component Blueprint -->

<!-- Default h1 -->
<h1
  class="suraia-title"
  data-suraia-component="Title"
  data-suraia-order="1"
>
  Heading Level 1
</h1>

<!-- h2 with size override to look like h4 -->
<h2
  class="suraia-title"
  data-suraia-component="Title"
  data-suraia-order="2"
  data-suraia-size="h4"
>
  Heading Level 2 (sized as h4)
</h2>

<!-- h3 truncated -->
<h3
  class="suraia-title"
  data-suraia-component="Title"
  data-suraia-order="3"
  data-suraia-truncate
>
  This heading will be truncated when it overflows.
</h3>
