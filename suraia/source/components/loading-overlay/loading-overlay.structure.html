<!-- Suraia LoadingOverlay Component Blueprint -->
<div
  class="suraia-loading-overlay"
  data-suraia-component="LoadingOverlay"
  role="progressbar"
  aria-busy="false"
>
  <!-- Background backdrop -->
  <div class="suraia-loading-overlay-backdrop"></div>

  <!-- Centered Loader container -->
  <div class="suraia-loading-overlay-content">
    <div class="suraia-loader" data-suraia-component="Loader">
      <!-- Default loader animation -->
      <span class="suraia-loader-bar"></span>
    </div>
  </div>
</div>
