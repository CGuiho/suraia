<!-- Suraia Text Component Blueprint -->
<p
  class="suraia-text"
  data-suraia-component="Text"
  data-suraia-size="md"
  data-suraia-variant="text"
>
  Text content goes here.
</p>

<!-- Span variant -->
<span
  class="suraia-text"
  data-suraia-component="Text"
  data-suraia-size="md"
  data-suraia-variant="text"
  data-suraia-inline
>
  Inline text content.
</span>

<!-- Truncated variant -->
<p
  class="suraia-text"
  data-suraia-component="Text"
  data-suraia-size="md"
  data-suraia-truncate="end"
>
  This text will be truncated with an ellipsis when it overflows.
</p>

<!-- Line clamp variant -->
<p
  class="suraia-text"
  data-suraia-component="Text"
  data-suraia-size="md"
  data-suraia-line-clamp="3"
>
  This text will be clamped after 3 lines.
</p>

<!-- Gradient variant -->
<p
  class="suraia-text"
  data-suraia-component="Text"
  data-suraia-variant="gradient"
>
  Gradient text content.
</p>
