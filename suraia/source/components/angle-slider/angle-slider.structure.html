<!-- Suraia AngleSlider Component Blueprint -->
<div
  class="suraia-angle-slider"
  data-suraia-component="AngleSlider"
  data-suraia-size="md"
  role="slider"
  aria-valuenow="45"
  aria-valuemin="0"
  aria-valuemax="360"
  aria-orientation="horizontal"
  tabindex="0"
>
  <div class="suraia-angle-slider-dial">
    <div class="suraia-angle-slider-needle" style="transform: rotate(45deg);"></div>
  </div>
  <div class="suraia-angle-slider-label">45°</div>
</div>
