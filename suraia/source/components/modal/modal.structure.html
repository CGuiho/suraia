<!-- Suraia Modal Component Blueprint -->
<div class="suraia-modal-root" data-suraia-component="Modal" data-suraia-opened>
  <!-- Overlay -->
  <div class="suraia-overlay" role="presentation"></div>

  <!-- Modal inner (centered or top-aligned) -->
  <div class="suraia-modal-inner">
    <div
      class="suraia-modal-content suraia-paper"
      data-suraia-size="md"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <!-- Header -->
      <div class="suraia-modal-header">
        <h2 class="suraia-modal-title" id="modal-title">Modal Title</h2>
        <button class="suraia-modal-close" type="button" aria-label="Close">&times;</button>
      </div>

      <!-- Body -->
      <div class="suraia-modal-body">
        Modal content goes here.
      </div>
    </div>
  </div>
</div>
