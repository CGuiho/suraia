<div class="suraia-color-picker" data-suraia-component="ColorPicker" data-suraia-format="hex">
  <div class="suraia-color-picker-saturation" role="slider" aria-label="Saturation and value" tabindex="0">
    <span class="suraia-color-picker-saturation-thumb"></span>
  </div>
  <div class="suraia-color-picker-slider" data-suraia-part="hue" role="slider" aria-label="Hue" tabindex="0">
    <span class="suraia-color-picker-slider-thumb"></span>
  </div>
  <div class="suraia-color-picker-slider" data-suraia-part="alpha" role="slider" aria-label="Alpha" tabindex="0">
    <span class="suraia-color-picker-slider-thumb"></span>
  </div>
  <div class="suraia-color-picker-swatches" role="listbox" aria-label="Color swatches">
    <button class="suraia-color-picker-swatch" type="button" aria-label="Select violet"></button>
  </div>
</div>
