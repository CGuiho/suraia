<!-- Suraia Skeleton Component Blueprint -->
<div
  class="suraia-skeleton"
  data-suraia-component="Skeleton"
  data-suraia-animate
  style="height: 20px; width: 100%;"
  role="status"
  aria-busy="true"
></div>

<!-- Circle skeleton -->
<div
  class="suraia-skeleton"
  data-suraia-component="Skeleton"
  data-suraia-animate
  data-suraia-circle
  style="height: 40px; width: 40px;"
  role="status"
  aria-busy="true"
></div>

<!-- Visible state (content loaded) -->
<div
  class="suraia-skeleton"
  data-suraia-component="Skeleton"
  data-suraia-visible
>
  <p>Real content displayed after loading.</p>
</div>
