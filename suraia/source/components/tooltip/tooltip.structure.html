<!-- Suraia Tooltip Component Blueprint -->
<div class="suraia-tooltip-wrapper" data-suraia-component="Tooltip">
  <!-- Trigger element -->
  <button type="button" aria-describedby="tooltip-content">
    Hover me
  </button>

  <!-- Tooltip floating element -->
  <div
    class="suraia-tooltip"
    id="tooltip-content"
    role="tooltip"
    data-suraia-position="top"
  >
    <span class="suraia-tooltip-arrow" data-suraia-with-arrow></span>
    Tooltip content
  </div>
</div>
